# ==========================================================================
# CRE PROJECT SETTINGS FILE
# ==========================================================================
# Project-specific settings for CRE CLI targets.
# Each target defines cre-cli, account, and rpcs groups.
#
# Example custom target:
# my-target:
#   cre-cli:
#     don-family: "zone-a"                          # Required: Workflow DON Family
#   account:
#     workflow-owner-address: "0x123..."            # Optional: Owner wallet/MSIG address (used for --unsigned transactions)
#   rpcs:
#     - chain-name: ethereum-mainnet                # Required: Chain RPC endpoints
#       url: "https://mainnet.infura.io/v3/KEY"

# ==========================================================================
local-simulation:
  rpcs:
    - chain-name: ethereum-testnet-sepolia
      url: https://0xrpc.io/sep

# ==========================================================================
staging:
  cre-cli:
    don-family: "zone-a"
  account:
    workflow-owner-address: "(optional) Multi-signature contract address"
  rpcs:
    - chain-name: ethereum-testnet-sepolia
      url: <select your own rpc url>
    - chain-name: ethereum-testnet-sepolia-base-1
      url: <select your own rpc url>

# ==========================================================================
# Production: required for workflow deploy (registers on Workflow Registry on mainnet).
# Set CRE_ETH_PRIVATE_KEY in .env to a funded EOA; run cre account link-key first.
# ==========================================================================
production-settings:
  cre-cli:
    don-family: "zone-a"
  account:
    workflow-owner-address: ""   # Leave empty to use CRE_ETH_PRIVATE_KEY
  rpcs:
    - chain-name: ethereum-mainnet
      url: https://eth.llamarpc.com
